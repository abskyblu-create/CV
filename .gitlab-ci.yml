image: node:20

stages:
  - build
  - deploy

cache: {}

build:
  stage: build
  script:
    - rm -rf node_modules package-lock.json
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/

pages:
  stage: deploy
  script:
    - rm -rf public/*
    - cp -r dist/* public/
    - cp -r dist/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH


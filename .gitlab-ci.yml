image: node:18

stages:
  - build
  - deploy

# IMPORTANT: disable caching of node_modules
cache: {}

build:
  stage: build
  script:
    - rm -rf node_modules package-lock.json
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/

pages:
  stage: deploy
  script:
    - mkdir public
    - cp -r dist/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
